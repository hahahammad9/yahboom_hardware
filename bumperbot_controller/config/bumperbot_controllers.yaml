controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    ackermann_steering_controller:
      type: ackermann_steering_controller/AckermannSteeringController

ackermann_steering_controller:
  ros__parameters:
    rear_wheels_names: ["back_left_joint", "back_right_joint"]
    front_wheels_names: ["front_left_steer_joint", "front_right_steer_joint"] # THESE ARE THE STEER JOINTS
    
    # Notice that "front_left_wheel_joint" and "front_right_wheel_joint" 
    # are completely removed from this file!
    
    front_wheels_radius: 0.0325
    rear_wheels_radius: 0.0325
    wheelbase: 0.23529
    front_wheel_track: 0.13
    rear_wheel_track: 0.1685
    reference_timeout: 0.5
    open_loop: true
    enable_odom_tf: true
    odom_frame_id: odom
    base_frame_id: base_link
    pose_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.01]